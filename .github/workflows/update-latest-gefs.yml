name: Update latest GEFS run

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-latest-gefs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect latest available GEFS cycle
        run: python scripts/update_latest_gefs_run.py

      - name: Commit changed metadata
        run: |
          if git diff --quiet -- latest_run.json; then
            echo "latest_run.json is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_run.json
          git commit -m "Update latest GEFS run metadata"
          git push
