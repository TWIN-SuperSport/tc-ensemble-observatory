name: Update GEFS analysis

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:
    inputs:
      force_init:
        description: "Optional GEFS init in YYYYMMDDHH format"
        required: false
        type: string
  push:
    paths:
      - "scripts/build_gefs_data.py"
      - "scripts/run_gefs_analysis.py"
      - "tracking_config.json"
      - "requirements.txt"
      - ".github/workflows/update-latest-gefs.yml"

permissions:
  contents: write

concurrency:
  group: update-gefs-analysis
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline pipeline self-test
        run: python scripts/run_gefs_analysis.py --self-test

      - name: Build latest complete 31-member GEFS analysis
        env:
          GEFS_DOWNLOAD_WORKERS: "8"
        run: |
          if [ -n "${{ inputs.force_init }}" ]; then
            python scripts/run_gefs_analysis.py --force-init "${{ inputs.force_init }}"
          else
            python scripts/run_gefs_analysis.py
          fi

      - name: Validate generated site payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('data.json').read_text())
          latest = json.loads(Path('latest_run.json').read_text())
          assert data['summary']['members'] == 31
          assert len(data['tracks']) == 31
          assert data['meta']['init'] == latest['init']
          assert latest['status'] == 'analysis_complete'
          assert Path('history', latest['init'] + '.json').exists()
          print('Validated init', latest['init'])
          PY

      - name: Commit completed analysis
        run: |
          if git diff --quiet -- data.json latest_run.json history; then
            echo "No new complete GEFS analysis"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json latest_run.json history
          git commit -m "Update complete GEFS ensemble analysis"
          git pull --rebase
          git push
